name: weatherfast
description: "WeatherFast"

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 3.9.1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.6.0
  dynamic_color: ^1.8.1
  flutter_typeahead: ^6.0.0
  geolocator: ^14.0.3
  package_info_plus: ^10.2.0
  permission_handler: ^12.0.3
  intl: ^0.20.2
  timezone: ^0.9.4
  flutter_inappwebview: ^6.1.5
  shared_preferences: ^2.5.5
  home_widget: 0.9.1
  workmanager: ^0.7.0
  flutter_dotenv: ^6.0.1
  mapbox_maps_flutter: ^2.25.1
  url_launcher: ^6.3.2
  skeletonizer: ^2.1.3
  in_app_review: ^2.0.12
  lottie: ^3.5.0
  m3e_core: ^0.1.1
  device_calendar: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/backgrounds/
    - assets/profilepics/
    - assets/appicon/
    - assets/animations/flood_alert.json
    - .env
